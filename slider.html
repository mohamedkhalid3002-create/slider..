<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Infinite Swipe Slider with Arrows via JS</title>
<style>

body{
    font-family: Arial;
}

.slider-wrapper{
    width:650px; 
    margin:50px auto;
    position: relative;
}

.slider{
    width:630px; 
    overflow:hidden;
    border-radius:10px;
    border:1px solid #ccc;
    touch-action: pan-y;
    margin:0 auto;
}

.slider-track{
    display:flex;
    transition:transform .5s ease;
    will-change: transform;
}

.card{
    min-width:200px;
    height:150px;
    margin:0 5px;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    font-weight:bold;
    color:#fff;
    flex-shrink:0;
}

.arrow{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background: rgba(0,0,0,0.5);
    color:#fff;
    border:none;
    font-size:30px;
    width:50px;
    height:50px;
    border-radius:50%;
    cursor:pointer;
    z-index:10;
}

.arrow:hover{
    background: rgba(0,0,0,0.8);
}

#prev{
    left:-60px; 
}

#next{
    right:-60px; 
}

</style>
</head>
<body>

<div class="slider-wrapper" id="sliderWrapper">
    <div class="slider" id="slider">
        <div class="slider-track" id="track">
            <div class="card" style="background:red">1</div>
            <div class="card" style="background:blue">2</div>
            <div class="card" style="background:green">3</div>
            <div class="card" style="background:orange">4</div>
            <div class="card" style="background:purple">5</div>
            <div class="card" style="background:brown">6</div>
        </div>
    </div>
</div>

<script>
const sliderWrapper = document.getElementById("sliderWrapper");
const track = document.getElementById("track");
const slider = document.getElementById("slider");
const cards = Array.from(track.children);
const cardWidth = 210; // 200 + 2*5 margin

// نسخ أول 3 وآخر 3 كروت للانفنتي
const cloneFirst = cards.slice(0,3).map(c => c.cloneNode(true));
const cloneLast = cards.slice(-3).map(c => c.cloneNode(true));
cloneFirst.forEach(c=>track.appendChild(c));
cloneLast.reverse().forEach(c=>track.insertBefore(c, track.firstChild));

let totalCards = track.children.length;
let index = 3; 
track.style.transform = `translateX(-${index * cardWidth}px)`;

// إنشاء الأسهم عبر JS
const prevBtn = document.createElement("button");
prevBtn.id = "prev";
prevBtn.className = "arrow";
prevBtn.innerHTML = "&#10094;";
const nextBtn = document.createElement("button");
nextBtn.id = "next";
nextBtn.className = "arrow";
nextBtn.innerHTML = "&#10095;";

sliderWrapper.appendChild(prevBtn);
sliderWrapper.appendChild(nextBtn);

// ======== متغير لمنع الضغط السريع =====
let isMoving = false;

// ======== دوال السحب ========
let startX = 0;
let currentTranslate = -index * cardWidth;
let prevTranslate = currentTranslate;
let isDragging = false;

slider.addEventListener("touchstart", touchStart);
slider.addEventListener("touchmove", touchMove);
slider.addEventListener("touchend", touchEnd);

function touchStart(e){
    isDragging = true;
    startX = e.touches[0].clientX;
    track.style.transition = "none";
}

function touchMove(e){
    if(!isDragging) return;
    const dx = e.touches[0].clientX - startX;
    currentTranslate = prevTranslate + dx;
    track.style.transform = `translateX(${currentTranslate}px)`;
}

function touchEnd(e){
    isDragging = false;
    if(isMoving) return; 
    let movedBy = currentTranslate - prevTranslate;
    if(movedBy < -50){ 
        index++;
    }else if(movedBy > 50){ 
        index--;
    }
    moveToIndex();
}

function moveToIndex(){
    isMoving = true;
    track.style.transition = "transform .5s ease";
    currentTranslate = -index * cardWidth;
    prevTranslate = currentTranslate;
    track.style.transform = `translateX(${currentTranslate}px)`;

    setTimeout(()=>{
        if(index >= totalCards -3){
            track.style.transition = "none";
            index = 3;
            currentTranslate = -index * cardWidth;
            prevTranslate = currentTranslate;
            track.style.transform = `translateX(${currentTranslate}px)`;
        }
        if(index <= 0){
            track.style.transition = "none";
            index = totalCards - 6;
            currentTranslate = -index * cardWidth;
            prevTranslate = currentTranslate;
            track.style.transform = `translateX(${currentTranslate}px)`;
        }
        isMoving = false;
    },500);
}

// ======== الأحداث للأسهم ========
nextBtn.onclick = ()=>{ if(!isMoving){ index++; moveToIndex(); } }
prevBtn.onclick = ()=>{ if(!isMoving){ index--; moveToIndex(); } }

</script>
</body>
</html>
